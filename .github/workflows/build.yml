name: Build iOS Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Dylib
        run: |
          xcrun --sdk iphoneos clang++ -dynamiclib -arch arm64 main.mm KeyAuth.cpp -o PasswordGate.dylib -framework UIKit -framework Foundation -std=c++11

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasswordGate
          path: PasswordGate.dylib
